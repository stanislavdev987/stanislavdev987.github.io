<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glassmorphism Design</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(245, 245, 245, 0.1);
            backdrop-filter: blur(10px);
            font-family: Arial, sans-serif;
        }
        .card {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            padding: 20px;
            margin: 10px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.3);
        }
        h1 {
            color: #fff;
            text-align: center;
        }
        /* Gradient Background */
        .gradient {
            background: linear-gradient(135deg, #6e7f80, #e3f2fd);
            color: #fff;
            padding: 15px;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div class="card gradient">
        <h1>Welcome to My Glassmorphism Design</h1>
        <p>This is a modern minimalist layout showcasing the liquid glass effect with smooth animations!</p>
    </div>
</body>
</html>
