<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glassmorphism Design</title>
    <style>
        body {
            background: #f0f0f0;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        .glass {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 10px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
            padding: 20px;
            width: 80%;
            margin: 10px 0;
        }
        h1, h2 {
            color: white;
        }
        h2 {
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="glass">
            <h1>Welcome to My Glassmorphism Design</h1>
            <h2>Apps Section</h2>
            <p>List of apps will go here.</p>
        </div>
        <div class="glass">
            <h2>Downloads Section</h2>
            <p>Download links will go here.</p>
        </div>
        <div class="glass">
            <h2>Updates Section</h2>
            <p>Update logs will go here.</p>
        </div>
    </div>
</body>
</html>
